<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Iframe Test</title>
<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
}

.header{
    height:90px;
    background:#ffcc00;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
}

iframe{
    width:100%;
    height:calc(100vh - 180px);
    border:none;
}

.footer{
    height:90px;
    background:#00bfff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
}
</style>
</head>

<body>

<div class="header">
إعلان الموقع
</div>

<iframe src="https://korralive.info"></iframe>

<div class="footer">
إعلان الموقع
</div>

</body>
</html>
